<svg xmlns="http://www.w3.org/2000/svg" width="700" height="476" viewBox="0 0 700 476">
  <rect width="700" height="476" rx="8" fill="#1e1e2e"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="350" y="22" fill="#888888" font-size="12" text-anchor="middle" font-family="monospace">alertflow — bash</text>
  <line x1="0" y1="34" x2="700" y2="34" stroke="#333333" stroke-width="1"/>
  <text x="16" y="48" fill="#a6e22e" font-size="13" font-family="monospace">$ python alertflow.py &quot;database connection pool exhausted, 503s spiking&quot;</text>
  <text x="16" y="68" fill="#f8f8f2" font-size="13" font-family="monospace"></text>
  <text x="16" y="88" fill="#ff5555" font-size="13" font-family="monospace">🔴  Severity:   P1</text>
  <text x="16" y="108" fill="#888888" font-size="13" font-family="monospace">    Category:  data</text>
  <text x="16" y="128" fill="#888888" font-size="13" font-family="monospace">    Summary:   Database connection pool exhausted causing 503 errors</text>
  <text x="16" y="148" fill="#f8f8f2" font-size="13" font-family="monospace"></text>
  <text x="16" y="168" fill="#888888" font-size="13" font-family="monospace">    Runbook:</text>
  <text x="16" y="188" fill="#f8f8f2" font-size="13" font-family="monospace">      1. Check current DB connections vs max_connections</text>
  <text x="16" y="208" fill="#f8f8f2" font-size="13" font-family="monospace">      2. Kill idle connections with pg_terminate_backend()</text>
  <text x="16" y="228" fill="#f8f8f2" font-size="13" font-family="monospace">      3. Identify connection-leaking query in app logs</text>
  <text x="16" y="248" fill="#f8f8f2" font-size="13" font-family="monospace">      4. Increase pool size in pgbouncer / app config</text>
  <text x="16" y="268" fill="#f8f8f2" font-size="13" font-family="monospace">      5. Deploy fix and monitor error rate on dashboard</text>
  <text x="16" y="288" fill="#f8f8f2" font-size="13" font-family="monospace"></text>
  <text x="16" y="308" fill="#a6e22e" font-size="13" font-family="monospace">$ python alertflow.py &quot;redis OOM, cache eviction at 100%&quot; --json</text>
  <text x="16" y="328" fill="#f8f8f2" font-size="13" font-family="monospace"></text>
  <text x="16" y="348" fill="#f8f8f2" font-size="13" font-family="monospace">{</text>
  <text x="16" y="368" fill="#f8f8f2" font-size="13" font-family="monospace">  &quot;severity&quot;: &quot;P2&quot;,</text>
  <text x="16" y="388" fill="#f8f8f2" font-size="13" font-family="monospace">  &quot;root_cause_category&quot;: &quot;data&quot;,</text>
  <text x="16" y="408" fill="#f8f8f2" font-size="13" font-family="monospace">  &quot;runbook&quot;: [&quot;Flush volatile keys&quot;, &quot;Increase maxmemory&quot;, ...],</text>
  <text x="16" y="428" fill="#f8f8f2" font-size="13" font-family="monospace">  &quot;summary&quot;: &quot;Redis OOM — all keys being evicted&quot;</text>
  <text x="16" y="448" fill="#f8f8f2" font-size="13" font-family="monospace">}</text>
  <text x="16" y="468" fill="#f8f8f2" font-size="13" font-family="monospace"></text>
  <rect x="16" y="459" width="8" height="15" fill="#f8f8f2" rx="1"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></rect>
</svg>