<svg xmlns="http://www.w3.org/2000/svg" width="700" height="476" viewBox="0 0 700 476">
  <style>
    text { font: 13px 'Cascadia Code', 'Fira Code', 'Courier New', monospace; white-space: pre; }
    .line { opacity: 0; }
  </style>
  <!-- terminal background -->
  <rect width="700" height="476" rx="8" fill="#1e1e2e"/>
  <!-- traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <!-- title bar -->
  <text x="350" y="22" fill="#888" font-size="12" text-anchor="middle" font-family="system-ui,sans-serif">alertflow — bash</text>
  <!-- divider -->
  <line x1="0" y1="34" x2="700" y2="34" stroke="#333" stroke-width="1"/>
  <text class="line" x="16" y="48" fill="#a6e22e">$ python alertflow.py &quot;database connection pool exhausted, 503s spiking&quot;<animate attributeName="opacity" values="0;1" dur="0.01s" begin="0.40s" fill="freeze"/></text>
  <text class="line" x="16" y="68" fill="#f8f8f2"><animate attributeName="opacity" values="0;1" dur="0.01s" begin="1.70s" fill="freeze"/></text>
  <text class="line" x="16" y="88" fill="#ff5555">🔴  Severity:   P1<animate attributeName="opacity" values="0;1" dur="0.01s" begin="1.85s" fill="freeze"/></text>
  <text class="line" x="16" y="108" fill="#888888">    Category:  data<animate attributeName="opacity" values="0;1" dur="0.01s" begin="2.15s" fill="freeze"/></text>
  <text class="line" x="16" y="128" fill="#888888">    Summary:   Database connection pool exhausted causing 503 errors<animate attributeName="opacity" values="0;1" dur="0.01s" begin="2.49s" fill="freeze"/></text>
  <text class="line" x="16" y="148" fill="#f8f8f2"><animate attributeName="opacity" values="0;1" dur="0.01s" begin="3.72s" fill="freeze"/></text>
  <text class="line" x="16" y="168" fill="#888888">    Runbook:<animate attributeName="opacity" values="0;1" dur="0.01s" begin="3.87s" fill="freeze"/></text>
  <text class="line" x="16" y="188" fill="#f8f8f2">      1. Check current DB connections vs max_connections<animate attributeName="opacity" values="0;1" dur="0.01s" begin="4.08s" fill="freeze"/></text>
  <text class="line" x="16" y="208" fill="#f8f8f2">      2. Kill idle connections with pg_terminate_backend()<animate attributeName="opacity" values="0;1" dur="0.01s" begin="5.09s" fill="freeze"/></text>
  <text class="line" x="16" y="228" fill="#f8f8f2">      3. Identify connection-leaking query in app logs<animate attributeName="opacity" values="0;1" dur="0.01s" begin="6.14s" fill="freeze"/></text>
  <text class="line" x="16" y="248" fill="#f8f8f2">      4. Increase pool size in pgbouncer / app config<animate attributeName="opacity" values="0;1" dur="0.01s" begin="7.11s" fill="freeze"/></text>
  <text class="line" x="16" y="268" fill="#f8f8f2">      5. Deploy fix and monitor error rate on dashboard<animate attributeName="opacity" values="0;1" dur="0.01s" begin="8.06s" fill="freeze"/></text>
  <text class="line" x="16" y="288" fill="#f8f8f2"><animate attributeName="opacity" values="0;1" dur="0.01s" begin="9.05s" fill="freeze"/></text>
  <text class="line" x="16" y="308" fill="#a6e22e">$ python alertflow.py &quot;redis OOM, cache eviction at 100%&quot; --json<animate attributeName="opacity" values="0;1" dur="0.01s" begin="9.20s" fill="freeze"/></text>
  <text class="line" x="16" y="328" fill="#f8f8f2"><animate attributeName="opacity" values="0;1" dur="0.01s" begin="10.35s" fill="freeze"/></text>
  <text class="line" x="16" y="348" fill="#f8f8f2">{<animate attributeName="opacity" values="0;1" dur="0.01s" begin="10.50s" fill="freeze"/></text>
  <text class="line" x="16" y="368" fill="#f8f8f2">  &quot;severity&quot;: &quot;P2&quot;,<animate attributeName="opacity" values="0;1" dur="0.01s" begin="10.70s" fill="freeze"/></text>
  <text class="line" x="16" y="388" fill="#f8f8f2">  &quot;root_cause_category&quot;: &quot;data&quot;,<animate attributeName="opacity" values="0;1" dur="0.01s" begin="11.05s" fill="freeze"/></text>
  <text class="line" x="16" y="408" fill="#f8f8f2">  &quot;runbook&quot;: [&quot;Flush volatile keys&quot;, &quot;Increase maxmemory&quot;, ...],<animate attributeName="opacity" values="0;1" dur="0.01s" begin="11.62s" fill="freeze"/></text>
  <text class="line" x="16" y="428" fill="#f8f8f2">  &quot;summary&quot;: &quot;Redis OOM — all keys being evicted&quot;<animate attributeName="opacity" values="0;1" dur="0.01s" begin="12.77s" fill="freeze"/></text>
  <text class="line" x="16" y="448" fill="#f8f8f2">}<animate attributeName="opacity" values="0;1" dur="0.01s" begin="13.66s" fill="freeze"/></text>
  <text class="line" x="16" y="468" fill="#f8f8f2"><animate attributeName="opacity" values="0;1" dur="0.01s" begin="13.86s" fill="freeze"/></text>
  <rect x="16" y="459" width="8" height="15" fill="#f8f8f2" rx="1"><animate attributeName="opacity" values="1;0;1" dur="1s" begin="14.01s" repeatCount="indefinite"/></rect>
</svg>